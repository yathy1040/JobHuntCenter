name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: job_hunt_command_center
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d job_hunt_command_center"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_GITHUB_ID: github-actions-github-id
      AUTH_GITHUB_SECRET: github-actions-github-secret
      AUTH_SECRET: github-actions-test-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/job_hunt_command_center?schema=public

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run database migrations
        run: ./node_modules/.bin/prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:run

      - name: Run production build
        run: npm run build

      - name: Install Playwright browsers
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
